    env:
      PS_DOCKER: ${{ matrix.DOCKER_VERSION }}
      SUFFIX: ${{ matrix.IMAGE_SUFFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3.1.0

      - name: Start containers
        working-directory: tests/UI/
        env:
          PS_VERSION: ${{ env.PS_DOCKER }}${{ env.SUFFIX }}
          PS_INSTALL_AUTO: 0
        run: |
          docker compose -f "docker-compose.yml" up -d --build
          ../../.github/check_url.sh http://localhost/ 200
          docker compose run -u prestashop:prestashop --rm reference-release php -d memory_limit=-1 /var/www/html/install-dev/index_cli.php \
            --domain=localhost --db_server=mysql:3306 --db_name=psreference --db_user=root \
            --db_password=root --prefix=ps_ --firstname="John" --lastname="Doe" \
            --password=prestashop --email=demo@prestashop.com --language=en --country=fr \
            --all_languages=0 --newsletter=0 --send_email=0 --ssl=0

      - name: Composer install
        run: composer install

      - name: Install module autoupgrade
        working-directory: tests/UI/
        run: |
          docker exec -t prestashop php -v bin/console prestashop:module install autoupgrade

      - name: Upgrade
        run: |
         docker exec -t prestashop php modules/autoupgrade/cli-upgrade.php --dir=admin-dev --channel=${{ matrix.UPGRADE_CHANNEL }}
         docker exec -t prestashop chmod 777 -R /var/www/html/var/cache/

      - name: Install dependencies
        working-directory: tests/UI/
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: tests/UI/
        run: npx playwright install chromium --with-deps

      - name: Run Sanity tests
        working-directory: tests/UI/
        env:
          PS_VERSION: ${{ matrix.PS_VERSION_END }}
          DB_USER: prestashop
          DB_PASSWD: prestashop
          DB_NAME: prestashop
          DB_PREFIX: ps_
        run: npx playwright test

      - name: Export Docker errors
        working-directory: tests/UI/
        if: always()
        run: docker compose logs --no-color >& docker-compose.log

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.PS_VERSION_START }}-${{ matrix.PS_VERSION_END }}-${{ matrix.PHP_VERSION }}
          path: |
            tests/UI/reports/
            tests/UI/report.json
            tests/UI/docker-compose.log
          retention-days: 30